# =============================================
# PRODUCTION CONFIGURATION (Railway)
# =============================================

# Server - Railway provides PORT
server.port=${PORT:8083}

# Database - Railway provides these variables
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/airtelinventory?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Thymeleaf (enable cache for production)
spring.thymeleaf.cache=true

# Logging for Production
logging.level.org.springframework.security=WARN
logging.level.com.airtel.inventory=INFO