<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Return Device - Airtel Inventory</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .form-container { background-color: white; padding: 20px; border-radius: 5px; width: 60%; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        select, textarea { width: 300px; padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        .btn-submit { background-color: orange; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-left: 150px; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin-bottom: 20px; }
        .info-box { background-color: #e6f7ff; padding: 10px; border-left: 4px solid #e60000; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>Return Device</h1></div>
    <a href="/" class="btn-back">Dashboard</a>
    
    <div class="form-container">
        <div class="info-box">
            <strong>Note:</strong> Only Assigned devices can be returned.
        </div>
        
        <form method="post" th:action="@{/assignments/return-device}">
            <div class="form-group">
                <label>Select Device to Return:</label>
                <select name="deviceId" required>
                    <option value="">-- Select Device --</option>
                    <option th:each="device : ${devices}" th:value="${device.id}" 
                            th:text="${device.assetTag} + ' - ' + ${device.brand} + ' ' + ${device.model} + ' (Assigned to: ' + ${device.currentOwner.name} + ')'"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Return Condition:</label>
                <select name="conditionWhenReturned" required>
                    <option value="New">New</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                    <option value="Poor">Poor</option>
                    <option value="Damaged">Damaged</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Return Notes:</label>
                <textarea name="returnNotes" rows="3" placeholder="Any issues or notes..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Return Device</button>
        </form>
    </div>
</body>
</html>
