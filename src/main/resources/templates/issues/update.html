<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Issue - Airtel Inventory</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .form-container { background-color: white; padding: 20px; border-radius: 5px; width: 60%; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        select, textarea { width: 300px; padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        .btn-submit { background-color: blue; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-left: 150px; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin-bottom: 20px; }
        .info-box { background-color: #e6f7ff; padding: 10px; border-left: 4px solid #e60000; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>Update Issue Status</h1></div>
    <a href="/issues" class="btn-back">Back to Issues</a>
    
    <div class="form-container">
        <div class="info-box">
            <strong>Device:</strong> <span th:text="${issue.device.brand} + ' ' + ${issue.device.model} + ' (' + ${issue.device.assetTag} + ')'"></span><br>
            <strong>Reported By:</strong> <span th:text="${issue.employee.name}"></span><br>
            <strong>Issue Date:</strong> <span th:text="${issue.issueDate}"></span><br>
            <strong>Description:</strong> <span th:text="${issue.issueDescription}"></span>
        </div>
        
        <form method="post" th:action="@{/issues/update-status/{id}(id=${issue.id})}">
            <div class="form-group">
                <label>Current Status:</label>
                <select name="status" required>
                    <option th:selected="${issue.status == 'Reported'}" value="Reported">Reported</option>
                    <option th:selected="${issue.status == 'In Progress'}" value="In Progress">In Progress</option>
                    <option th:selected="${issue.status == 'Resolved'}" value="Resolved">Resolved</option>
                    <option th:selected="${issue.status == 'Closed'}" value="Closed">Closed</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Resolution Notes:</label>
                <textarea name="resolutionNotes" rows="4" placeholder="Enter resolution notes..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Update Status</button>
        </form>
    </div>
</body>
</html>
