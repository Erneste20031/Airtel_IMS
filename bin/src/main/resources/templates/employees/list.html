<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees - Airtel Inventory</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background-color: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e60000; color: white; }
        .btn { padding: 5px 10px; text-decoration: none; border-radius: 3px; margin: 2px; display: inline-block; }
        .btn-add { background-color: green; color: white; padding: 10px 15px; display: inline-block; margin-bottom: 20px; }
        .btn-edit { background-color: blue; color: white; }
        .btn-delete { background-color: red; color: white; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; display: inline-block; margin-bottom: 20px; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="header"><h1>Employee Management</h1></div>
    <a href="/" class="btn-back">Dashboard</a>
    <a href="/employees/add" class="btn-add">+ Add New Employee</a>
    
    <table>
        <thead><tr><th>ID</th><th>Employee ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Position</th><th>Department</th><th>Actions</th></tr></thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}">1</td>
                <td th:text="${emp.employeeId}">EMP001</td>
                <td th:text="${emp.name}">John Doe</td>
                <td th:text="${emp.email}">john@airtel.com</td>
                <td th:text="${emp.phone}">0788000001</td>
                <td th:text="${emp.position}">Manager</td>
                <td th:text="${emp.department.name}">IT</td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-edit">Edit</a>
                    <a th:href="@{/employees/delete/{id}(id=${emp.id})}" class="btn btn-delete" onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
