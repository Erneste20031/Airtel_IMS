<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Department</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .form-container { background-color: white; padding: 20px; border-radius: 5px; width: 50%; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input { width: 250px; padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        .btn-submit { background-color: green; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-left: 100px; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>Add New Department</h1></div>
    <a href="/departments" class="btn-back">Back</a>
    <div class="form-container">
        <form method="post" th:action="@{/departments/save}" th:object="${department}">
            <div class="form-group"><label>Name:</label><input type="text" th:field="*{name}" required/></div>
            <div class="form-group"><label>Location:</label><input type="text" th:field="*{location}"/></div>
            <button type="submit" class="btn-submit">Save Department</button>
        </form>
    </div>
</body>
</html>
