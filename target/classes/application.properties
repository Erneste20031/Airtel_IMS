# =============================================
# PRODUCTION CONFIGURATION (Railway)
# =============================================

# Server - Railway provides PORT
server.port=${PORT:8080}

# Database - Railway provides these variables
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/airtelinventory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool (for better performance)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Hibernate Batch Processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Thymeleaf (enable cache for production)
spring.thymeleaf.cache=true
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Actuator Health Check (for Railway healthchecks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.db.enabled=true

# Logging for Production
logging.level.org.springframework.security=WARN
logging.level.com.airtel.inventory=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN

# Timezone
spring.jackson.time-zone=UTC