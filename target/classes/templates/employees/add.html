<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .form-container { background-color: white; padding: 20px; border-radius: 5px; width: 60%; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input, select { width: 250px; padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        .btn-submit { background-color: green; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-left: 120px; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>Add New Employee</h1></div>
    <a href="/employees" class="btn-back">Back</a>
    <div class="form-container">
        <form method="post" th:action="@{/employees/save}" th:object="${employee}">
            <div class="form-group"><label>Employee ID:</label><input type="text" th:field="*{employeeId}" required/></div>
            <div class="form-group"><label>Name:</label><input type="text" th:field="*{name}" required/></div>
            <div class="form-group"><label>Email:</label><input type="email" th:field="*{email}"/></div>
            <div class="form-group"><label>Phone:</label><input type="text" th:field="*{phone}"/></div>
            <div class="form-group"><label>Position:</label><input type="text" th:field="*{position}"/></div>
            <div class="form-group">
                <label>Department:</label>
                <select th:field="*{department.id}">
                    <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Save Employee</button>
        </form>
    </div>
</body>
</html>
