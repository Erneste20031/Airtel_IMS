<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report Issue - Airtel Inventory</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .header { background-color: #e60000; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .form-container { background-color: white; padding: 20px; border-radius: 5px; width: 60%; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        select, textarea, input { width: 300px; padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        .btn-submit { background-color: green; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-left: 150px; }
        .btn-back { background-color: gray; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin-bottom: 20px; }
        .info-box { background-color: #e6f7ff; padding: 10px; border-left: 4px solid #e60000; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>Report Device Issue</h1></div>
    <a href="/issues" class="btn-back">Back to Issues</a>
    
    <div class="form-container">
        <div class="info-box">
            <strong>Note:</strong> Only assigned devices can have issues reported.
        </div>
        
        <form method="post" th:action="@{/issues/save}">
            <div class="form-group">
                <label>Select Device:</label>
                <select name="deviceId" required>
                    <option value="">-- Select Device --</option>
                    <option th:each="device : ${devices}" th:value="${device.id}" 
                            th:text="${device.assetTag} + ' - ' + ${device.brand} + ' ' + ${device.model} + ' (Assigned to: ' + ${device.currentOwner.name} + ')'"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Select Employee:</label>
                <select name="employeeId" required>
                    <option value="">-- Select Employee --</option>
                    <option th:each="emp : ${employees}" th:value="${emp.id}" 
                            th:text="${emp.employeeId} + ' - ' + ${emp.name}"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Issue Type:</label>
                <select name="issueType" required>
                    <option value="Hardware">Hardware Issue</option>
                    <option value="Software">Software Issue</option>
                    <option value="Physical Damage">Physical Damage</option>
                    <option value="Connectivity">Connectivity Issue</option>
                    <option value="Battery">Battery Issue</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Priority:</label>
                <select name="priority" required>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Issue Description:</label>
                <textarea name="issueDescription" rows="4" placeholder="Describe the issue in detail..." required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Report Issue</button>
        </form>
    </div>
</body>
</html>
